{% extends "base.html" %}
{% load stats %}
{% load static %}
{% block leaflet %}
    <link rel="stylesheet" href="{% static "css/leaflet.css" %}" />
    <script src="{% static "js/leaflet.js" %}"></script>
    <link rel="stylesheet" href="{% static "css/MarkerCluster.css" %}" />
    <link rel="stylesheet" href="{% static "css/MarkerCluster.Default.css" %}" />
    <script src="{% static "js/leaflet.markercluster.js" %}"></script>
    <link rel="stylesheet" href="{% static "css/icpe.css" %}" />
{% endblock leaflet %}
{% block main %}
    <div class="main-container">
        <h1>Données ICPE</h1>
        <div id="map"></div>
        <div>
            <div class="fr-callout" id="installation-infos" style="display: none">
                <h1 id="installation-name"></h1>
                <div id="installation-address"></div>
            </div>
            <div id="#graphes" style="display: none"></div>
            <div id="installation-rubriques-table"
                 class="fr-table"
                 style="display: none">
                <table>
                    <caption>Rubriques ICPE associées à l'Établissement</caption>
                    <thead>
                        <tr>
                            <th scope="col">Rubrique</th>
                            <th scope="col">Nature</th>
                            <th scope="col">Quantité autorisée</th>
                            <th scope="col">Unité</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
{% endblock main %}
{% block scripts %}
    <script src="{% static "js/icpe.js" %}"></script>
{% endblock %}
